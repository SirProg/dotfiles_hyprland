# hyprpaper.conf — INACTIVO
#
# Reemplazado por swww para soportar transiciones animadas.
# El script de wallpaper está en: ~/.config/hypr/scripts/wallpaper.sh
#
# Para volver a hyprpaper:
#   1. Descomenta la config de abajo
#   2. En autostart.conf cambia wallpaper.sh por:
#      exec-once = sleep 1 && hyprpaper

# preload = ~/dotfiles/wallpapers/
#
# splash = true
# splash_opacity = 0.8
#
# wallpaper {
#   monitor =
#   path = ~/dotfiles/wallpapers/
#   fit_mode = cover
#   timeout = 120
# }
