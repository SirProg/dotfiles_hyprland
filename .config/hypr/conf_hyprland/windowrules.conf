# conf/windowrules.conf — window and workspace rules
# See https://wiki.hypr.land/Configuring/Window-Rules/
# See https://wiki.hypr.land/Configuring/Workspace-Rules/

# --- General rules ---

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class = .*

# Fix dragging issues with XWayland
windowrule = no_focus on, match:class .*, match:title .*, match:xwayland 1, match:float yes, match:fullscreen no, match:pin no

# --- App-specific rules ---

# IntelliJ IDEA — float license/data-sharing dialogs
windowrule {
    name = jetbrains-idea-fix
    match:class = ^jetbrains-idea.*$
    match:title = ^IntelliJ IDEA User Agreement$
    match:title = ^Data Sharing$

    float = true
    center = true
    stay_focused = true
}

# --- Workspace rules ---
# Uncomment to enable "smart gaps" (no gaps when only one window)
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]
